<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte de Visite - Romain Sihou | Albert</title>
  <style>
    @page {
      size: 90mm 55mm;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', Times, Georgia, serif;
      background: #f5f0eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    h2.card-label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: -20px;
    }

    /* Business card container */
    .card {
      width: 340px;
      height: 200px;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.12),
        0 8px 30px rgba(0,0,0,0.08);
    }

    /* ===== FRONT ===== */
    .card-front {
      background: #080405;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(70, 15, 28, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(50, 12, 22, 0.2) 0%, transparent 55%);
      pointer-events: none;
    }

    .card-front .logo-img {
      width: 180px;
      height: auto;
      position: relative;
      z-index: 1;
      /* Silver/chrome effect matching the logo */
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }

    /* ===== BACK ===== */
    .card-back {
      background: #faf8f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 28px;
      position: relative;
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #080405, #3a0f18, #080405);
    }

    .back-top {
      margin-bottom: 16px;
    }

    .back-name {
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .back-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
    }

    .back-details {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .back-detail {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-detail-icon {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      color: #3a0f18;
    }

    .back-detail-text {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8.5px;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.04em;
    }

    .back-logo-small {
      position: absolute;
      bottom: 18px;
      right: 24px;
      width: 50px;
      height: auto;
      opacity: 0.12;
    }

    /* Print styles */
    @media print {
      body {
        background: white;
        padding: 0;
        gap: 20mm;
      }

      h2.card-label {
        display: none;
      }

      .card {
        box-shadow: none;
        border: 0.5px solid #ddd;
        width: 90mm;
        height: 55mm;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <h2 class="card-label">Recto</h2>
  <div class="card card-front">
    <img src="/images/albert-logo.png" alt="Albert" class="logo-img">
  </div>

  <h2 class="card-label">Verso</h2>
  <div class="card card-back">
    <div class="back-top">

        </svg>

        </svg>
        <span class="back-detail-text">wa.me/971561720809</span>
      </div>
      <div class="back-detail">
        <svg class="back-detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>

      </div>
    </div>
    <img src="/images/albert-logo.png" alt="" class="back-logo-small">
  </div>

</body>
</html>
