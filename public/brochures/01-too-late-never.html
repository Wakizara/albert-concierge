<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert | Too Late? Never.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'TimesCondensed'; src: url('../fonts/times-nr-mt-condensed-regular.otf') format('opentype'); font-weight: 400; }
    @font-face { font-family: 'TimesCondensed'; src: url('../fonts/times-nr-mt-condensed-bold.otf') format('opentype'); font-weight: 700; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #0a0a0a;
      color: #f5f0eb;
      font-family: 'TimesCondensed', 'Times New Roman', serif;
      overflow: hidden;
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url('../images/jet.jpg') center center / cover no-repeat;
      opacity: 0.25;
      filter: grayscale(40%);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.85) 60%, rgba(10,10,10,0.95) 100%);
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo {
      width: 80px;
      opacity: 0.9;
    }

    .tag {
      font-family: 'TimesCondensed', serif;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c9a96e;
      border: 1px solid rgba(201,169,110,0.3);
      padding: 8px 16px;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 120px;
    }

    .pre-title {
      font-family: 'TimesCondensed', serif;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 82px;
      line-height: 0.95;
      margin-bottom: 40px;
      color: #f5f0eb;
    }

    h1 em {
      font-style: italic;
      color: #c9a96e;
    }

    .desc {
      font-size: 20px;
      line-height: 1.7;
      color: rgba(245,240,235,0.65);
      max-width: 520px;
      letter-spacing: 0.3px;
    }

    .stats {
      display: flex;
      gap: 60px;
      margin-top: 48px;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: #c9a96e;
      display: block;
    }

    .stat-label {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,240,235,0.4);
      margin-top: 4px;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .cta {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c9a96e;
    }

    .line {
      flex: 1;
      height: 1px;
      background: rgba(201,169,110,0.2);
      margin: 0 40px;
    }

    .contact {
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(245,240,235,0.4);
    }

    .accent-line {
      width: 60px;
      height: 1px;
      background: #c9a96e;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="top">
      <img src="../images/albert-logo.png" alt="Albert" class="logo">
      <div class="tag">Last Minute Luxury</div>
    </div>

    <div class="middle">
      <div class="pre-title">When time runs out</div>
      <h1>Too Late?<br><em>Never.</em></h1>
      <div class="accent-line"></div>
      <p class="desc">Your event is in 6 hours. Your venue just cancelled. Your guests are already in the air. Others panic. We perform.</p>
      <div class="stats">
        <div>
          <span class="stat-num">2h</span>
          <span class="stat-label">Average response</span>
        </div>
        <div>
          <span class="stat-num">50+</span>
          <span class="stat-label">Countries</span>
        </div>
        <div>
          <span class="stat-num">24/7</span>
          <span class="stat-label">Always on</span>
        </div>
      </div>
    </div>

    <div class="bottom">
      <span class="cta">We make it happen</span>
      <div class="line"></div>
      <span class="contact">albert-conciergerie.com</span>
    </div>
  </div>
</body>
</html>
